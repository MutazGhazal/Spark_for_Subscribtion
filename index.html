<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark | متجر الاشتراكات الرقمية</title>
  <meta name="description" content="Spark - أفضل الأسعار للاشتراكات الرقمية - بث، برامج، ألعاب">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Spark | متجر الاشتراكات الرقمية" id="ogTitle">
  <meta property="og:description" content="اشتراكاتك الرقمية بأفضل الأسعار - بث، برامج، ألعاب" id="ogDesc">
  <meta property="og:image" content="" id="ogImage">
  <meta property="og:url" content="" id="ogUrl">
  <meta property="og:site_name" content="Spark">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
</head>
<body>

  <!-- Splash Intro -->
  <div class="splash" id="splash">
    <canvas id="fireCanvas"></canvas>
    <div class="splash-line"></div>
    <div class="splash-content" dir="ltr">
      <div class="splash-brand" dir="ltr">
        <span class="spark-letter" style="--i:0">S</span><span class="spark-letter" style="--i:1">p</span><span class="spark-letter" style="--i:2">a</span><span class="spark-letter" style="--i:3">r</span><span class="spark-letter" style="--i:4">k</span><span class="spark-icon" style="--i:5">⚡</span>
      </div>
      <p class="splash-tagline" data-ar="اشتراكاتك الرقمية بأفضل الأسعار" data-en="Your Digital Subscriptions at Best Prices">اشتراكاتك الرقمية بأفضل الأسعار</p>
    </div>
  </div>

  <!-- Last Updated Banner -->
  <div class="last-updated-bar" id="lastUpdatedBar"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="#" class="logo">
        <div class="logo-icon">
          ⚡
          <span class="logo-spark"></span>
          <span class="logo-spark"></span>
          <span class="logo-spark"></span>
          <span class="logo-spark"></span>
          <span class="logo-spark"></span>
          <span class="logo-spark"></span>
        </div>
        <span id="storeName">Spark</span>
      </a>
      <div class="header-actions">
        <button class="btn-icon" id="searchToggle" title="بحث">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="btn-icon lang-toggle" id="langToggle" title="Switch Language">EN</button>
        <button class="btn-icon" id="themeToggle" title="الوضع الليلي">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-float hero-float-1"></div>
    <div class="hero-float hero-float-2"></div>
    <div class="hero-float hero-float-3"></div>
    <div class="hero-content">
      <h1 id="heroTitle">اشتراكاتك الرقمية بأفضل الأسعار</h1>
      <p id="heroSub">نوفر لك اشتراكات أصلية ومضمونة بأسعار منافسة مع دعم فني على مدار الساعة</p>
      <div class="hero-badges">
        <div class="hero-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span data-ar="اشتراكات أصلية" data-en="Original Subscriptions">اشتراكات أصلية</span>
        </div>
        <div class="hero-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span data-ar="دفع آمن" data-en="Secure Payment">دفع آمن</span>
        </div>
        <div class="hero-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span data-ar="دعم 24/7" data-en="24/7 Support">دعم 24/7</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Search -->
  <div class="search-wrapper" id="searchWrapper" style="display:none;">
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="ابحث عن اشتراك..." autocomplete="off">
    </div>
  </div>

  <!-- Exchange Rate Banner -->
  <div class="rate-banner" id="rateInfo" style="display:none;"></div>

  <!-- Categories -->
  <section class="categories-section reveal">
    <div class="categories-bar" id="categoriesBar"></div>
  </section>

  <!-- Products -->
  <section class="products-section reveal">
    <div class="products-grid" id="productsGrid"></div>
    <div class="no-results" id="noResults" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="m8 8 6 6"/><path d="m14 8-6 6"/></svg>
      <p id="noResultsText">لا توجد نتائج</p>
    </div>
  </section>

  <!-- Payment Methods Section -->
  <section class="payment-section reveal" id="paymentSection">
    <div class="payment-section-inner">
      <div class="section-title">
        <h2 id="paymentTitle">طرق الدفع المتاحة</h2>
        <p id="paymentSubtitle">اختر الطريقة الأنسب لك للدفع بسهولة وأمان</p>
      </div>
      <div class="payment-grid" id="paymentGrid"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-links" id="footerLinks"></div>
      <p class="footer-copy" id="footerCopy"></p>
    </div>
  </footer>

  <!-- Requirements Form Modal -->
  <div class="modal-overlay" id="requirementsModal" onclick="if(event.target===this){this.classList.remove('active');document.body.style.overflow=''}">
    <div class="modal requirements-modal">
      <div class="modal-header">
        <h3 id="reqModalTitle">بيانات الطلب</h3>
        <button class="modal-close" onclick="document.getElementById('requirementsModal').classList.remove('active');document.body.style.overflow=''" type="button">&times;</button>
      </div>
      <div class="modal-body" id="reqModalBody"></div>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div class="modal-overlay" id="productDetailModal" onclick="if(event.target===this){this.classList.remove('active');document.body.style.overflow=''}">
    <div class="modal product-detail-modal">
      <button class="modal-close" onclick="document.getElementById('productDetailModal').classList.remove('active');document.body.style.overflow=''" type="button">&times;</button>
      <div class="modal-body" id="productDetailBody"></div>
    </div>
  </div>

  <!-- Payment Modal -->
  <div class="modal-overlay" id="paymentModal" onclick="if(event.target===this){this.classList.remove('active');document.body.style.overflow=''}">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">اختر طريقة الدفع</h3>
        <button class="modal-close" id="modalClose" onclick="document.getElementById('paymentModal').classList.remove('active');document.body.style.overflow=''" type="button">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Sparkles -->
  <canvas id="sparklesCanvas"></canvas>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/referral.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
