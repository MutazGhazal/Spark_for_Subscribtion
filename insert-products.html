let inserted = 0, failed = 0;

async function insertAll() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  log('⚡ جاري تسجيل الدخول وإضافة المنتجات...', 'info');
  log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');

  for (let i = 0; i < products.length; i++) {
    const p = products[i];
    const progress = document.getElementById('progress');
    progress.textContent = `⏳ ${i+1} / ${products.length} — ${p.name_ar}`;
    
    const productData = {
      ...p,
      requirements_ar: '',
      requirements_en: '',
      source_url: p.subscription_plans[0]?.source_url || '',
      payment_links: { paypal: '', stripe: '', whatsapp_message: '' },
      sort_order: i + 1,
      updated_at: new Date().toISOString(),
      created_at: new Date().toISOString()
    };

    try {
      const { error } = await sb.from('products').upsert(productData, { onConflict: 'id' });
      if (error) {
        log(`❌ فشل: ${p.name_ar} — ${error.message}`, 'err');
        failed++;
      } else {
        log(`✅ تمت إضافة: <b>${p.name_ar}</b> (${p.subscription_plans.length} مدة)`, 'ok');
        inserted++;
      }
    } catch(e) {
      log(`❌ خطأ: ${p.name_ar} — ${e.message}`, 'err');
      failed++;
    }

    await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('progress').textContent = '';
  log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
  log(`🏁 اكتمل! ✅ ${inserted} منتج تمت إضافتهم | ❌ ${failed} فشل`, inserted > 0 ? 'ok' : 'err');
  if (inserted > 0) {
    log('🔄 يمكنك الآن إغلاق هذه الصفحة وزيارة متجرك لرؤية المنتجات الجديدة', 'info');
  }
}
