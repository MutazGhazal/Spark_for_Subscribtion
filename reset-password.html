<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary,#f5f5f5); }
    .card { background:#fff; border-radius:16px; padding:2.5rem; width:100%; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,0.12); text-align:center; }
    .icon { font-size:3rem; margin-bottom:1rem; }
    h1 { font-size:1.4rem; margin-bottom:0.5rem; }
    p { color:#666; margin-bottom:1.5rem; font-size:0.9rem; }
    .form-group { text-align:right; margin-bottom:1rem; }
    label { display:block; font-size:0.85rem; margin-bottom:0.4rem; font-weight:600; }
    input { width:100%; padding:0.75rem 1rem; border:1.5px solid #ddd; border-radius:10px; font-size:1rem; box-sizing:border-box; }
    input:focus { outline:none; border-color:#1db954; }
    button { width:100%; padding:0.8rem; background:#1db954; color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:0.5rem; }
    button:hover { background:#17a348; }
    .msg { margin-top:1rem; padding:0.75rem; border-radius:8px; font-size:0.9rem; display:none; }
    .msg.success { background:#d4edda; color:#155724; display:block; }
    .msg.error { background:#f8d7da; color:#721c24; display:block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔑</div>
    <h1>تعيين كلمة مرور جديدة</h1>
    <p>أدخل كلمة المرور الجديدة لحسابك</p>
    <div class="form-group">
      <label for="newPass">كلمة المرور الجديدة</label>
      <input type="password" id="newPass" placeholder="6 أحرف على الأقل" minlength="6">
    </div>
    <div class="form-group">
      <label for="confirmPass">تأكيد كلمة المرور</label>
      <input type="password" id="confirmPass" placeholder="أعد كتابة كلمة المرور">
    </div>
    <button onclick="resetPassword()">حفظ كلمة المرور</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    // استخراج access_token من الـ URL hash
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (!accessToken) {
      document.querySelector('.card').innerHTML = `
        <div class="icon">❌</div>
        <h1>رابط غير صالح</h1>
        <p>الرابط منتهي الصلاحية أو غير صحيح. يرجى طلب رابط جديد من صفحة الأدمن.</p>
      `;
    } else {
      // تسجيل الجلسة باستخدام التوكن
      sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    }

    async function resetPassword() {
      const pass = document.getElementById('newPass').value;
      const confirm = document.getElementById('confirmPass').value;
      const msg = document.getElementById('msg');
      
      msg.className = 'msg';
      msg.style.display = 'none';

      if (pass.length < 6) {
        msg.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
        msg.className = 'msg error'; return;
      }
      if (pass !== confirm) {
        msg.textContent = 'كلمتا المرور غير متطابقتين';
        msg.className = 'msg error'; return;
      }

      const { error } = await sb.auth.updateUser({ password: pass });
      if (error) {
        msg.textContent = 'خطأ: ' + error.message;
        msg.className = 'msg error';
      } else {
        msg.textContent = '✅ تم تغيير كلمة المرور بنجاح! سيتم تحويلك للوحة التحكم...';
        msg.className = 'msg success';
        setTimeout(() => { window.location.href = 'admin.html'; }, 2000);
      }
    }
  </script>
</body>
</html>
